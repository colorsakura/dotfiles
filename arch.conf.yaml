- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ["~", "~/.config"]

- link:
    ~/.config/aria2: app/aria2
    ~/.config/fish: app/fish
    ~/.config/ghostty: app/ghostty
    ~/.config/mpv: app/mpv
    ~/.config/neovide: app/neovide
    ~/.config/nvim: app/nvim
    ~/.config/zed: app/zed
    ~/.config:
      glob: true
      path: config/*
    ~/.local/share/fcitx5/rime: submodules/rime-ice
    ~/.local/share/fcitx5/rime/:
      glob: true
      path: app/rime/*
    ~/.local/share/fcitx5/themes: local/fcitx5/themes

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - [pacman -Qqet > packages.new]

