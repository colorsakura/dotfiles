# XSettings configuration for GTK applications
# This file is read by xsettingsd to provide XSETTINGS to GTK apps
# Format: Setting/Name <value>
# See: https://wiki.archlinux.org/title/Xsettingsd

# Cursor settings
Net/CursorBlinkTime 1000
Net/CursorBlink 1
Gtk/CursorThemeSize 48
Gtk/CursorThemeName "breeze_cursors"

# Display scaling (for high-DPI displays)
# UnscaledDPI = 96 * scale_factor * 1024
# For 2x scaling: 96 * 2 * 1024 = 196608
# Current value 98304 suggests ~1.5x scaling or custom adjustment
Gdk/UnscaledDPI 98304
Gdk/WindowScalingFactor 2

# GTK theme and appearance
Net/ThemeName "Breeze"
Net/IconThemeName "WhiteSur"
Net/SoundThemeName "ocean"

# GTK behavior settings
Gtk/EnableAnimations 1
Gtk/DecorationLayout "icon:minimize,maximize,close"
Gtk/PrimaryButtonWarpsSlider 1
Gtk/ToolbarStyle 3
Gtk/MenuImages 1
Gtk/ButtonImages 1

# Font settings
# Format: "Family Name, Size"
Gtk/FontName "Noto Sans,  10"

