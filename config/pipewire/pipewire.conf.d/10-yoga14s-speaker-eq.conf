context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Yoga 14s 硬件优化音效"
            node.name        = "yoga_optimized_sink"
            media.class      = Audio/Sink
            filter.graph = {
                nodes = [
                    # 第 1 段：增强低音 (100Hz 附近)
                    {
                        type    = builtin
                        name    = yoga_band_1
                        label   = bq_peaking
                        control = { "Freq" = 100.0 "Q" = 1.0 "Gain" = 7.0 }
                    }
                    # 第 2 段：提升人声清晰度 (1500Hz 附近)
                    {
                        type    = builtin
                        name    = yoga_band_2
                        label   = bq_peaking
                        control = { "Freq" = 1500.0 "Q" = 1.2 "Gain" = 3.5 }
                    }
                    # 第 3 段：提升高频亮度 (5000Hz 附近)
                    {
                        type    = builtin
                        name    = yoga_band_3
                        label   = bq_peaking
                        control = { "Freq" = 5000.0 "Q" = 1.5 "Gain" = 4.0 }
                    }
                ]
                # 修复后的链路：1 -> 2 -> 3
                links = [
                    { output = "yoga_band_1:Out" input = "yoga_band_2:In" }
                    { output = "yoga_band_2:Out" input = "yoga_band_3:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "effect_input.yoga_eq"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name    = "effect_output.yoga_eq"
                node.passive = true
            }
        }
    }
]
