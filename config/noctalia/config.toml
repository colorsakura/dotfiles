[bar.default]
background_opacity = 0.89999997988343239
contact_shadow = true
end = [
    "media",
    "tray",
    "notifications",
    "privacy",
    "recorder",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "session"
]
margin_edge = 0
margin_ends = 0
radius = 0
thickness = 32

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
active_monitor_only = true
auto_hide = true
enabled = true
pinned = [ "obsidian", "com.mitchellh.ghostty" ]
reserve_space = false
show_dots = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 720.0
    cy = 777.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[notification]
layer = "overlay"

[osd]
position = "bottom_center"

[plugin_settings."noctalia/screen_recorder"]
video_codec = "av1"

[plugins]
enabled = [ "noctalia/screen_recorder", "noctalia/bongocat" ]

[shell]
lang = "zh-Hans"
launch_apps_as_systemd_services = true
polkit_agent = true
settings_show_advanced = true

    [shell.shadow]
    alpha = 0.29999999329447746

[theme]
builtin = "Nord"
community_palette = "ADW"
wallpaper_scheme = "muted"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "ghostty", "niri", "qt" ]
    community_ids = [ "neovim", "zed", "yazi" ]

[wallpaper.default]
path = "/home/iFlygo/Pictures/Wallpapers/mc_wallpaper_movie_vista_2560x1440.png"

[wallpaper.last]
path = "/home/iFlygo/Pictures/Wallpapers/mc_wallpaper_movie_vista_2560x1440.png"

[wallpaper.monitors.eDP-1]
path = "/home/iFlygo/Pictures/Wallpapers/mc_wallpaper_movie_vista_2560x1440.png"

[widget.cat]
type = "noctalia/bongocat:cat"

[widget.media]
hide_when_no_media = true

[widget.privacy]
hide_inactive = true

[widget.recorder]
type = "noctalia/screen_recorder:recorder"
